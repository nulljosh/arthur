<!DOCTYPE html>
<html>
<head>
    <title>nuLLM - Text Generation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input[type="text"], textarea, input[type="number"], input[type="range"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="range"] {
            flex: 1;
        }
        .slider-value {
            min-width: 50px;
            text-align: right;
            font-weight: 600;
            color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .output {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 150px;
            white-space: pre-wrap;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            display: none;
        }
        .output.visible {
            display: block;
        }
        .loading {
            color: #667eea;
            font-style: italic;
        }
        .error {
            color: #e74c3c;
            background: #ffe8e8;
            border-left: 4px solid #e74c3c;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 nuLLM</h1>
        <p class="subtitle">Nano Language Model - Text Generation</p>
        
        <div class="input-group">
            <label for="prompt">Prompt</label>
            <input type="text" id="prompt" placeholder="Enter starting text..." value="Whether">
        </div>
        
        <div class="input-group">
            <label for="length">Length: <span id="lengthValue">100</span> characters</label>
            <div class="slider-container">
                <input type="range" id="length" min="10" max="500" value="100" oninput="document.getElementById('lengthValue').textContent = this.value">
            </div>
        </div>
        
        <div class="input-group">
            <label for="temperature">Temperature: <span id="tempValue">0.8</span></label>
            <div class="slider-container">
                <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="0.8" oninput="document.getElementById('tempValue').textContent = this.value">
            </div>
            <small style="color: #666; margin-top: 5px; display: block;">Lower = more predictable, Higher = more creative</small>
        </div>
        
        <button onclick="generate()">Generate Text</button>
        
        <div id="output" class="output"></div>
        
        <div class="footer">
            Built in one night 🚀 | Part of the 3-language sprint
        </div>
    </div>
    
    <script>
        async function generate() {
            const prompt = document.getElementById('prompt').value;
            const length = document.getElementById('length').value;
            const temperature = document.getElementById('temperature').value;
            const output = document.getElementById('output');
            
            output.className = 'output visible loading';
            output.textContent = 'Generating...';
            
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt, length, temperature})
                });
                
                const data = await response.json();
                
                if (data.error) {
                    output.className = 'output visible error';
                    output.textContent = data.error;
                } else {
                    output.className = 'output visible';
                    output.textContent = data.text;
                }
            } catch (error) {
                output.className = 'output visible error';
                output.textContent = 'Error: ' + error.message;
            }
        }
        
        // Generate on Enter key
        document.getElementById('prompt').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generate();
        });
    </script>
</body>
</html>
