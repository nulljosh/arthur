<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="#f5f5f7" stroke="#d1d5db" stroke-width="1"/>
  <rect x="12" y="12" width="176" height="176" rx="24" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  
  <!-- Neuron/brain inspired web: central node -->
  <circle cx="100" cy="100" r="8" fill="#7c3aed" opacity="0.9"/>
  
  <!-- Outer ring of 6 nodes -->
  <circle cx="140" cy="75" r="6" fill="#7c3aed" opacity="0.8"/>
  <circle cx="145" cy="125" r="6" fill="#7c3aed" opacity="0.8"/>
  <circle cx="115" cy="155" r="6" fill="#7c3aed" opacity="0.7"/>
  <circle cx="60" cy="155" r="6" fill="#7c3aed" opacity="0.7"/>
  <circle cx="55" cy="125" r="6" fill="#7c3aed" opacity="0.8"/>
  <circle cx="60" cy="75" r="6" fill="#7c3aed" opacity="0.8"/>
  
  <!-- Connections (mind map web) -->
  <line x1="100" y1="100" x2="140" y2="75" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <line x1="100" y1="100" x2="145" y2="125" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <line x1="100" y1="100" x2="115" y2="155" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <line x1="100" y1="100" x2="60" y2="155" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <line x1="100" y1="100" x2="55" y2="125" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  <line x1="100" y1="100" x2="60" y2="75" stroke="#7c3aed" stroke-width="1.2" opacity="0.4"/>
  
  <!-- Outer ring connections (web pattern) -->
  <line x1="140" y1="75" x2="145" y2="125" stroke="#7c3aed" stroke-width="0.8" opacity="0.2"/>
  <line x1="145" y1="125" x2="115" y2="155" stroke="#7c3aed" stroke-width="0.8" opacity="0.2"/>
  <line x1="115" y1="155" x2="60" y2="155" stroke="#7c3aed" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="155" x2="55" y2="125" stroke="#7c3aed" stroke-width="0.8" opacity="0.2"/>
  <line x1="55" y1="125" x2="60" y2="75" stroke="#7c3aed" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="75" x2="140" y2="75" stroke="#7c3aed" stroke-width="0.8" opacity="0.2"/>
  
  <!-- Center glow accent -->
  <circle cx="100" cy="100" r="10" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
</svg>
