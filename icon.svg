<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="40" fill="#111"/>
  <!-- Transformer layers: three horizontal bars -->
  <rect x="50" y="56" width="100" height="12" rx="6" fill="#fff" opacity="0.9"/>
  <rect x="50" y="94" width="100" height="12" rx="6" fill="#fff" opacity="0.6"/>
  <rect x="50" y="132" width="100" height="12" rx="6" fill="#fff" opacity="0.35"/>
  <!-- Vertical connections between layers -->
  <line x1="75" y1="68" x2="75" y2="94" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <line x1="100" y1="68" x2="100" y2="94" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <line x1="125" y1="68" x2="125" y2="94" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <line x1="75" y1="106" x2="75" y2="132" stroke="#fff" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="106" x2="100" y2="132" stroke="#fff" stroke-width="2" opacity="0.2"/>
  <line x1="125" y1="106" x2="125" y2="132" stroke="#fff" stroke-width="2" opacity="0.2"/>
</svg>
