<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arthur | Chat</title>
<style>
:root {
  --font-ui:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui,sans-serif;
  --radius-pill:100px;--radius-lg:24px;--blur-glass:20px;
  --transition-spring:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  --shadow-soft:0 20px 40px rgba(0,0,0,0.24);
}
html[data-theme="dark"] {
  --bg:#070b14;--bg-elev:rgba(18,24,40,0.6);--bg-header:rgba(8,12,22,0.64);
  --surface:rgba(18,28,48,0.44);--surface-strong:rgba(24,36,62,0.56);
  --border:rgba(255,255,255,0.16);--text:#eef3ff;--muted:rgba(232,240,255,0.72);
  --accent:#0a84ff;--accent-ghost:rgba(10,132,255,0.2);--mesh-a:rgba(17,93,197,0.42);
  --mesh-b:rgba(30,67,160,0.36);--mesh-c:rgba(13,40,106,0.4);--card-glow:rgba(10,132,255,0.2);--msg-user:#0a84ff;
}
html[data-theme="light"] {
  --bg:#f5f8ff;--bg-elev:rgba(255,255,255,0.78);--bg-header:rgba(255,255,255,0.72);
  --surface:rgba(255,255,255,0.72);--surface-strong:rgba(255,255,255,0.86);
  --border:rgba(7,30,84,0.12);--text:#0f1e33;--muted:rgba(15,30,51,0.72);
  --accent:#0071e3;--accent-ghost:rgba(0,113,227,0.12);--mesh-a:rgba(117,183,255,0.42);
  --mesh-b:rgba(187,229,255,0.44);--mesh-c:rgba(144,201,255,0.3);--card-glow:rgba(0,113,227,0.14);--msg-user:#0071e3;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body {
  font-family:var(--font-ui);
  background:radial-gradient(1200px 720px at 8% 10%,var(--mesh-a),transparent 60%),radial-gradient(900px 620px at 88% 22%,var(--mesh-b),transparent 62%),radial-gradient(980px 760px at 50% 88%,var(--mesh-c),transparent 64%),var(--bg);
  color:var(--text);line-height:1.5;letter-spacing:-0.011em;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
}
a{color:inherit;text-decoration:none}
.topbar {
  position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border);background:var(--bg-header);
  backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));
}
.topbar-inner{width:min(1024px,calc(100% - 1.1rem));min-height:66px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:0.85rem}
.brand{font-weight:700;font-size:1.18rem;letter-spacing:-0.02em}
.top-actions{display:inline-flex;align-items:center;gap:0.5rem}
.icon-btn {
  width:42px;height:42px;border-radius:999px;border:1px solid var(--border);background:var(--bg-elev);color:var(--text);
  backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));display:inline-flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;transition:var(--transition-spring),background 0.2s ease,border-color 0.2s ease;
}
.icon-btn:hover{transform:translateY(-2px) scale(1.02);border-color:var(--accent);background:var(--accent-ghost)}
.icon-btn:focus-visible,.send-btn:focus-visible,textarea:focus-visible,input[type="range"]:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.status-row {
  width:min(1024px,calc(100% - 1.1rem));margin:0 auto 0.8rem;padding:0.62rem 0.8rem;border-radius:16px;
  display:flex;align-items:center;justify-content:space-between;gap:0.75rem;background:var(--surface-strong);border:1px solid var(--border);
  backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));color:var(--muted);font-size:0.8rem;letter-spacing:0.01em;
}
.status-left{display:inline-flex;align-items:center;gap:0.5rem;min-width:0}
.dot{width:8px;height:8px;border-radius:999px;background:#86868b;flex-shrink:0}
.dot.online{background:#30d158}.dot.error{background:#ff3b30}
.status-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.settings {
  width:min(1024px,calc(100% - 1.1rem));margin:0 auto 0.8rem;padding:0.7rem 0.8rem;border-radius:16px;display:none;grid-template-columns:1fr;gap:0.8rem;
  background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));
}
.settings.open{display:grid}
.setting{display:grid;grid-template-columns:90px 1fr 54px;align-items:center;gap:0.55rem;font-size:0.82rem;color:var(--muted)}
.setting input[type="range"]{accent-color:var(--accent);width:100%}
.setting .value{text-align:right;color:var(--text);font-variant-numeric:tabular-nums}
.chat-wrap{flex:1;overflow:hidden;width:min(1024px,calc(100% - 1.1rem));margin:0 auto;display:flex;flex-direction:column;min-height:0}
.chat{flex:1;overflow-y:auto;padding:0.2rem 0 1rem;display:flex;flex-direction:column;gap:0.72rem;scroll-behavior:smooth;min-height:0}
.empty{flex:1;min-height:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);gap:0.36rem;padding:1rem}
.empty h2{color:var(--text);font-size:clamp(1.3rem,5vw,1.8rem);letter-spacing:-0.02em}
.msg{max-width:75%;padding:0.66rem 0.84rem;border-radius:18px;white-space:pre-wrap;word-break:break-word;line-height:1.45;font-size:0.95rem;animation:fadeUp 0.25s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{
  align-self:flex-end;background:var(--msg-user);color:#fff;border:1px solid color-mix(in srgb,var(--msg-user) 70%,#ffffff 30%);
  box-shadow:0 10px 24px color-mix(in srgb,var(--msg-user) 36%,transparent);border-bottom-right-radius:8px;
}
.msg.ai {
  align-self:flex-start;background:var(--surface-strong);border:1px solid var(--border);
  backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);border-bottom-left-radius:8px;
}
.msg.system {
  align-self:center;max-width:100%;font-size:0.8rem;color:var(--muted);padding:0.28rem 0.55rem;border-radius:12px;
  background:color-mix(in srgb,var(--surface) 70%,transparent);border:1px solid var(--border);
  backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));
}
.typing {
  display:none;align-self:flex-start;padding:0.48rem 0.7rem;border-radius:14px;background:var(--surface);border:1px solid var(--border);
  backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));margin-bottom:0.35rem;width:fit-content;
}
.typing span{display:inline-block;width:8px;height:8px;border-radius:999px;background:var(--muted);margin:0 2px;animation:bounce 1.4s infinite ease-in-out both}
.typing span:nth-child(1){animation-delay:-0.32s}.typing span:nth-child(2){animation-delay:-0.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}
.composer{position:sticky;bottom:0;padding:0.66rem 0 0.9rem;background:linear-gradient(to top,color-mix(in srgb,var(--bg) 82%,transparent),transparent)}
.composer-shell {
  border-radius:20px;padding:0.44rem;display:flex;align-items:flex-end;gap:0.5rem;background:var(--surface);border:1px solid var(--border);
  backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));
}
.composer textarea {
  flex:1;border:0;outline:none;background:transparent;color:var(--text);resize:none;font:inherit;line-height:1.4;font-size:0.95rem;
  padding:0.5rem 0.5rem 0.5rem 0.6rem;max-height:150px;min-height:40px;
}
.composer textarea::placeholder{color:color-mix(in srgb,var(--muted) 88%,transparent)}
.send-btn {
  width:40px;height:40px;border-radius:999px;border:1px solid transparent;background:var(--accent);color:#fff;font-size:1.05rem;cursor:pointer;
  transition:var(--transition-spring),background 0.2s ease;flex-shrink:0;
}
.send-btn:hover{transform:translateY(-2px) scale(1.03);background:color-mix(in srgb,var(--accent) 80%,#4ea2ff 20%)}
.send-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none}
@media (max-width:720px){.msg{max-width:88%}.topbar-inner{min-height:62px}.brand{font-size:1.12rem}.setting{grid-template-columns:82px 1fr 48px}}
</style>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/" aria-label="Back to home">arthur</a>
    <div class="top-actions">
      <button id="settingsBtn" class="icon-btn" aria-label="Toggle settings" title="Settings">&#9881;</button>
      <button id="themeBtn" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">&#9790;</button>
    </div>
  </div>
  <div class="status-row">
    <div class="status-left"><span id="statusDot" class="dot"></span><span id="statusText" class="status-text">Loading local model...</span></div>
    <span id="configText">-</span>
  </div>
  <section id="settings" class="settings" aria-label="Inference settings">
    <label class="setting" for="temperature"><span>Temperature</span><input id="temperature" type="range" min="0.1" max="1.5" step="0.05" value="0.5"><span id="temperatureVal" class="value">0.50</span></label>
    <label class="setting" for="maxTokens"><span>Max tokens</span><input id="maxTokens" type="range" min="16" max="256" step="1" value="120"><span id="maxTokensVal" class="value">120</span></label>
  </section>
</header>
<main class="chat-wrap">
  <section id="chat" class="chat" aria-live="polite">
    <div id="empty" class="empty"><h2>arthur chat</h2><p>Client-side ONNX inference with character-level generation.</p></div>
    <div id="typing" class="typing" aria-label="Typing indicator"><span></span><span></span><span></span></div>
  </section>
  <div class="composer"><div class="composer-shell"><textarea id="input" rows="1" placeholder="Message arthur..." autofocus></textarea><button id="sendBtn" class="send-btn" title="Send" aria-label="Send">&#9654;</button></div></div>
</main>
<script>
const chatEl=document.getElementById('chat');
const inputEl=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
const typingEl=document.getElementById('typing');
const emptyEl=document.getElementById('empty');
const statusDot=document.getElementById('statusDot');
const statusText=document.getElementById('statusText');
const configText=document.getElementById('configText');
const settingsBtn=document.getElementById('settingsBtn');
const settingsEl=document.getElementById('settings');
const tempEl=document.getElementById('temperature');
const tempValEl=document.getElementById('temperatureVal');
const maxTokensEl=document.getElementById('maxTokens');
const maxTokensValEl=document.getElementById('maxTokensVal');
const themeBtn=document.getElementById('themeBtn');
const state={session:null,vocab:null,charToIdx:null,idxToChar:null,vocabSize:0,modelCfg:{},maxCtx:256,ready:false,localFailure:null,loadingPromise:null,generating:false};
function setTheme(theme){document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('arthur-theme',theme);themeBtn.textContent=theme==='dark'?'\u2600':'\u263e';}
function initTheme(){setTheme(localStorage.getItem('arthur-theme')||'dark');}
themeBtn.addEventListener('click',()=>{const current=document.documentElement.getAttribute('data-theme')||'dark';setTheme(current==='dark'?'light':'dark');});
function setStatus(kind,text){statusDot.className='dot';if(kind==='online')statusDot.classList.add('online');if(kind==='error')statusDot.classList.add('error');statusText.textContent=text;}
function updateSettingsLabels(){tempValEl.textContent=Number(tempEl.value).toFixed(2);maxTokensValEl.textContent=String(parseInt(maxTokensEl.value,10));}
function hideEmpty(){if(emptyEl)emptyEl.style.display='none';}
function addMessage(role,text){hideEmpty();const node=document.createElement('div');node.className=`msg ${role}`;node.textContent=text;chatEl.insertBefore(node,typingEl);chatEl.scrollTop=chatEl.scrollHeight;return node;}
function addSystem(text){const node=document.createElement('div');node.className='msg system';node.textContent=text;chatEl.insertBefore(node,typingEl);chatEl.scrollTop=chatEl.scrollHeight;}
function setTyping(show){typingEl.style.display=show?'block':'none';if(show)chatEl.scrollTop=chatEl.scrollHeight;}
function resizeInput(){inputEl.style.height='auto';inputEl.style.height=`${Math.min(inputEl.scrollHeight,150)}px`;}
function extractAnswer(text){const idx=text.indexOf('A:');let out=idx>=0?text.slice(idx+2):text;const stop=out.indexOf('\nQ:');if(stop>=0)out=out.slice(0,stop);return out.trim();}
function getConfigValues(cfg){const layers=cfg.num_layers??cfg.layers??'?';const heads=cfg.num_heads??cfg.heads??'?';const dim=cfg.embed_dim??cfg.dim??cfg.d_model??'?';return{layers,heads,dim};}
function encodeChars(text,maxLen){const chars=Array.from(text);const clip=chars.length>maxLen?chars.slice(chars.length-maxLen):chars;const ids=new Array(clip.length);for(let i=0;i<clip.length;i+=1){const id=state.charToIdx[clip[i]];ids[i]=Number.isFinite(id)?id:0;}return{ids,clippedText:clip.join('')};}
function decodeToken(idx){if(Array.isArray(state.idxToChar))return state.idxToChar[idx]||'';return state.idxToChar[String(idx)]||'';}
function sampleFromLogits(data,offset,vocabSize,temperature){const temp=Math.max(0.01,Number(temperature)||0.5);let maxLogit=-Infinity;for(let i=0;i<vocabSize;i+=1){const value=data[offset+i]/temp;if(value>maxLogit)maxLogit=value;}const probs=new Float64Array(vocabSize);let sum=0;for(let i=0;i<vocabSize;i+=1){const expv=Math.exp((data[offset+i]/temp)-maxLogit);probs[i]=expv;sum+=expv;}let r=Math.random()*sum;for(let i=0;i<vocabSize;i+=1){r-=probs[i];if(r<=0)return i;}return vocabSize-1;}
async function ensureLocalModel(){
  if(state.ready)return true;
  if(state.loadingPromise)return state.loadingPromise;
  state.loadingPromise=(async()=>{
    try {
      setStatus('loading','Loading local model...');
      if(window.ort&&window.ort.env&&window.ort.env.wasm){window.ort.env.wasm.wasmPaths='https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/';}
      const vocabResp=await fetch('/model/vocab.json',{cache:'no-store'});
      if(!vocabResp.ok)throw new Error(`vocab ${vocabResp.status}`);
      const vocab=await vocabResp.json();
      if(!vocab.char_to_idx||!vocab.idx_to_char)throw new Error('vocab format invalid');
      const session=await window.ort.InferenceSession.create('/model/arthur.onnx',{executionProviders:['wasm']});
      state.session=session;state.vocab=vocab;state.charToIdx=vocab.char_to_idx;state.idxToChar=vocab.idx_to_char;
      state.vocabSize=Number(vocab.vocab_size)||(Array.isArray(vocab.idx_to_char)?vocab.idx_to_char.length:Object.keys(vocab.idx_to_char).length);
      state.modelCfg=vocab.model_cfg||{};state.maxCtx=Number(state.modelCfg.max_len)||256;state.ready=true;state.localFailure=null;
      const c=getConfigValues(state.modelCfg);configText.textContent=`${c.layers}L/${c.heads}H/${c.dim}d`;setStatus('online','Local ONNX ready');
      return true;
    } catch (err) {
      state.localFailure=err;state.ready=false;configText.textContent='-';setStatus('error','Local model unavailable; using API fallback');
      addSystem('Local model failed to load. Falling back to /api/generate.');
      return false;
    }
  })();
  return state.loadingPromise;
}
async function generateWithOnnx(userMessage,temperature,maxTokens){
  const prompt=`Q: ${userMessage}\nA:`;let context=prompt;let generated='';const limit=Math.min(maxTokens,state.maxCtx);
  for(let i=0;i<limit;i+=1){
    const encoded=encodeChars(context,state.maxCtx);
    const tensor=new window.ort.Tensor('int64',BigInt64Array.from(encoded.ids.map((id)=>BigInt(id))),[1,encoded.ids.length]);
    const output=await state.session.run({input_ids:tensor});
    const outputName=output.logits?'logits':Object.keys(output)[0];
    const logits=output[outputName];const dims=logits.dims;const seqLen=dims[1];const vocabSize=dims[2]||state.vocabSize;
    const idx=sampleFromLogits(logits.data,(seqLen-1)*vocabSize,vocabSize,temperature);const ch=decodeToken(idx);
    if(!ch)break;generated+=ch;context+=ch;if(generated.includes('\nQ:'))break;
  }
  return extractAnswer(`${prompt}${generated}`);
}
async function generateWithApi(userMessage,temperature,maxTokens){
  const prompt=`Q: ${userMessage}\nA:`;
  const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,length:maxTokens,temperature})});
  const data=await res.json();if(!res.ok||data.error)throw new Error(data.error||`HTTP ${res.status}`);return extractAnswer(data.text||'');
}
async function send(){
  const text=inputEl.value.trim();if(!text||state.generating)return;
  addMessage('user',text);inputEl.value='';resizeInput();state.generating=true;sendBtn.disabled=true;setTyping(true);
  const temperature=Number(tempEl.value)||0.5;const maxTokens=parseInt(maxTokensEl.value,10)||120;
  try {
    const localReady=await ensureLocalModel();
    const output=localReady?await generateWithOnnx(text,temperature,maxTokens):await generateWithApi(text,temperature,maxTokens);
    addMessage('ai',output||'(empty response)');
  } catch (err) {
    try {const fallback=await generateWithApi(text,temperature,maxTokens);addMessage('ai',fallback||'(empty response)');setStatus('error','Using API fallback');}
    catch (apiErr) {addSystem(`Generation failed: ${apiErr.message||err.message}`);}
  } finally {state.generating=false;sendBtn.disabled=false;setTyping(false);}
}
settingsBtn.addEventListener('click',()=>settingsEl.classList.toggle('open'));
tempEl.addEventListener('input',updateSettingsLabels);
maxTokensEl.addEventListener('input',updateSettingsLabels);
inputEl.addEventListener('input',resizeInput);
inputEl.addEventListener('keydown',(event)=>{if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}});
sendBtn.addEventListener('click',send);
initTheme();updateSettingsLabels();resizeInput();ensureLocalModel();
</script>
</body>
</html>
