<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>Arthur</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts/geist-sans/style.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #111111;
      --text-primary: #f5f5f7;
      --text-secondary: #98989d;
      --border: rgba(255, 255, 255, 0.06);
      --accent: #0a84ff;
    }

    html[data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f7;
      --text-primary: #111111;
      --text-secondary: #636366;
      --border: #c5c5ca;
      --accent: #0a84ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 16px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: "Geist", -apple-system, sans-serif;
      font-weight: 300;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .app {
      width: min(100%, 720px);
      border-radius: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.28);
    }

    .header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .title-wrap {
      min-width: 0;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      letter-spacing: -0.04em;
    }

    .title {
      margin: 0;
      font-size: clamp(1.25rem, 1.7vw, 1.45rem);
      font-weight: 500;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 0.8125rem;
      letter-spacing: -0.01em;
    }

    .theme-toggle {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s ease, background-color 0.2s ease;
      flex: 0 0 auto;
    }

    .theme-toggle:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 38%, var(--border));
    }

    .theme-toggle svg {
      width: 17px;
      height: 17px;
      display: block;
      fill: currentColor;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: color-mix(in srgb, var(--bg-primary) 32%, transparent);
      padding: 11px 12px;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.2s ease, background-color 0.2s ease;
    }

    .stat:hover {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .stat-value {
      margin-top: 6px;
      font-size: 0.9rem;
      font-weight: 450;
      letter-spacing: -0.01em;
    }

    .chat {
      height: min(54vh, 560px);
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 92%;
      padding: 10px 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 14px;
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent);
      color: #ffffff;
      border: 1px solid color-mix(in srgb, var(--accent) 72%, #000000 28%);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .typing {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--text-secondary);
      animation: bounce 0.8s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.1s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.2s;
    }

    @keyframes bounce {
      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.6;
      }
      40% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #prompt {
      flex: 1;
      min-height: 46px;
      max-height: 128px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 12px 13px;
      font: inherit;
      font-size: 0.9rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    #prompt::placeholder {
      color: var(--text-secondary);
      transition: opacity 0.3s ease;
    }

    #prompt:focus {
      outline: 0;
      border-color: color-mix(in srgb, var(--accent) 48%, var(--border));
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .send-btn {
      border: 0;
      min-height: 46px;
      border-radius: 28px;
      padding: 0 17px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s ease;
    }

    .send-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .send-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .app {
        min-height: calc(100vh - 20px);
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .chat {
        flex: 1;
        height: auto;
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app" data-aos="fade-up">
    <header class="header animate__animated animate__fadeIn">
      <div class="title-wrap">
        <h1 class="title">Arthur</h1>
        <p class="subtitle">Interactive demo chat interface</p>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme"></button>
    </header>

    <section class="stats" aria-label="Model statistics">
      <div class="stat">
        <div class="stat-label">Parameters</div>
        <div class="stat-value">65M</div>
      </div>
      <div class="stat">
        <div class="stat-label">Context</div>
        <div class="stat-value">8K tokens</div>
      </div>
      <div class="stat">
        <div class="stat-label">Loss</div>
        <div class="stat-value">0.0115</div>
      </div>
    </section>

    <section id="chat" class="chat" aria-live="polite"></section>

    <form id="composer" class="composer">
      <textarea id="prompt" name="prompt" placeholder="Ask Arthur anything"></textarea>
      <button class="send-btn" type="submit">Send</button>
    </form>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    const chatEl = document.getElementById('chat');
    const formEl = document.getElementById('composer');
    const promptEl = document.getElementById('prompt');
    const rootEl = document.documentElement;
    const themeToggleEl = document.getElementById('themeToggle');
    const themeMetaEl = document.querySelector('meta[name="theme-color"]');

    const THEME_KEY = 'arthur-theme';
    const moonIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.2A9 9 0 1 1 9.8 3a7 7 0 0 0 11.2 11.2z"></path></svg>';
    const sunIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12zm0-16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1zm0 16a1 1 0 0 1 1 1v2a1 1 0 1 1-2 0v-2a1 1 0 0 1 1-1zm9-7a1 1 0 1 1 0 2h-2a1 1 0 1 1 0-2h2zM5 12a1 1 0 1 1 0 2H3a1 1 0 1 1 0-2h2zm12.95 5.536a1 1 0 0 1 1.414 1.414l-1.414 1.414a1 1 0 1 1-1.414-1.414l1.414-1.414zM6.464 6.05a1 1 0 1 1 1.414 1.414L6.464 8.878A1 1 0 0 1 5.05 7.464L6.464 6.05zm12.9 2.828a1 1 0 1 1-1.414-1.414l1.414-1.414a1 1 0 1 1 1.414 1.414l-1.414 1.414zM7.878 17.536a1 1 0 1 1-1.414 1.414L5.05 17.536a1 1 0 0 1 1.414-1.414l1.414 1.414z"></path></svg>';

    function applyTheme(theme) {
      rootEl.setAttribute('data-theme', theme);
      themeToggleEl.innerHTML = theme === 'light' ? moonIcon : sunIcon;
      themeToggleEl.setAttribute('aria-label', theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode');
      themeMetaEl.setAttribute('content', theme === 'light' ? '#ffffff' : '#000000');
      localStorage.setItem(THEME_KEY, theme);
    }

    const storedTheme = localStorage.getItem(THEME_KEY);
    applyTheme(storedTheme === 'light' ? 'light' : 'dark');

    themeToggleEl.addEventListener('click', () => {
      const nextTheme = rootEl.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      applyTheme(nextTheme);
    });

    const history = [];

    const placeholders = [
      '17 * (8 - 3)',
      'write a debounce function',
      "explain Arthur's architecture",
      'write a fibonacci in python',
      'what is Arthur trained on?',
      '(256 / 4) + 12',
    ];
    let placeholderIdx = 0;
    setInterval(() => {
      placeholderIdx = (placeholderIdx + 1) % placeholders.length;
      promptEl.placeholder = placeholders[placeholderIdx];
    }, 3000);

    function addMessage(role, text) {
      history.push({ role, text });
      const el = document.createElement('article');
      el.className = `message ${role}`;
      el.textContent = text;
      chatEl.appendChild(el);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function computeArithmetic(input) {
      const normalized = input.replace(/x/gi, '*').replace(/÷/g, '/').trim();
      if (!/^[\d\s+\-*/().%]+$/.test(normalized)) {
        return null;
      }

      try {
        const value = Function(`"use strict"; return (${normalized});`)();
        if (typeof value !== 'number' || !Number.isFinite(value)) {
          return null;
        }
        return value;
      } catch {
        return null;
      }
    }

    function makeCodeReply(prompt) {
      const lower = prompt.toLowerCase();
      if (lower.includes('python')) {
        return '```python\ndef fibonacci(n):\n    a, b = 0, 1\n    out = []\n    for _ in range(n):\n        out.append(a)\n        a, b = b, a + b\n    return out\n```';
      }
      return '```javascript\nfunction debounce(fn, wait = 200) {\n  let t;\n  return (...args) => {\n    clearTimeout(t);\n    t = setTimeout(() => fn(...args), wait);\n  };\n}\n```';
    }

    function localResponder(prompt) {
      const lower = prompt.toLowerCase();
      const arithmeticMatch = prompt.match(/([-+*/().%\d\sxX÷]{3,})/);
      const arithmeticValue = arithmeticMatch ? computeArithmetic(arithmeticMatch[1]) : null;

      if (arithmeticValue !== null) {
        return `Computed result: ${arithmeticValue}`;
      }

      if (/(code|snippet|function|javascript|js|python|api)/i.test(lower)) {
        return makeCodeReply(prompt);
      }

      if (/(model|arthur|train|loss|context|parameter)/i.test(lower)) {
        return 'Arthur is a compact 65M-parameter transformer tuned for concise reasoning. The 8K context window helps it sustain longer exchanges, and the 0.0115 training loss indicates stable convergence for a small model class.';
      }

      return 'Arthur can handle lightweight arithmetic, generate short implementation snippets, and discuss model design tradeoffs. Ask for a quick example and I will respond in the same format you need.';
    }

    function showTypingIndicator() {
      const indicator = document.createElement('div');
      indicator.className = 'typing';
      indicator.setAttribute('aria-label', 'Assistant is typing');
      indicator.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      chatEl.appendChild(indicator);
      chatEl.scrollTop = chatEl.scrollHeight;
      return indicator;
    }

    addMessage('assistant', 'Arthur demo is online. Try: "17 * (8 - 3)", "write a debounce function", or "explain Arthur\'s architecture".');

    formEl.addEventListener('submit', async (event) => {
      event.preventDefault();
      const prompt = promptEl.value.trim() || promptEl.placeholder;

      addMessage('user', prompt);
      promptEl.value = '';

      const typingEl = showTypingIndicator();
      await new Promise((resolve) => setTimeout(resolve, 520));
      const reply = localResponder(prompt);
      typingEl.remove();
      addMessage('assistant', reply);
    });

    AOS.init({ duration: 600, once: true });
  </script>
</body>
</html>
