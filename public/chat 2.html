<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arthur | Chat</title>
<style>
:root {
  --font-display: "Playfair Display", Georgia, serif;
  --font-body: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --radius-sm: 12px;
  --radius-md: 14px;
  --radius-lg: 16px;
  --radius-pill: 100px;
  --transition-spring: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.04), 0 16px 40px rgba(0,0,0,0.08);
}

html[data-theme="dark"] {
  --bg-primary: #000000;
  --bg-card: #0f0f0f;
  --bg-elevated: rgba(30,30,30,0.5);
  --bg-header: rgba(0,0,0,0.8);
  --text-primary: #ffffff;
  --text-secondary: #999999;
  --text-muted: #666666;
  --accent: #0a84ff;
  --accent-light: rgba(10,132,255,0.15);
  --border: rgba(255,255,255,0.08);
  --msg-user: #0a84ff;
  --msg-ai: rgba(255,255,255,0.06);
}

html[data-theme="light"] {
  --bg-primary: #ffffff;
  --bg-card: #f9f9f9;
  --bg-elevated: rgba(240,240,240,0.7);
  --bg-header: rgba(255,255,255,0.9);
  --text-primary: #000000;
  --text-secondary: #666666;
  --text-muted: #999999;
  --accent: #0071e3;
  --accent-light: rgba(0,113,227,0.1);
  --border: rgba(0,0,0,0.08);
  --msg-user: #0071e3;
  --msg-ai: rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  letter-spacing: -0.01em;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid var(--border);
  background: var(--bg-header);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.topbar-inner {
  width: 100%;
  max-width: 960px;
  margin: 0 auto;
  padding: 0.75rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.brand {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.3rem;
  letter-spacing: -0.03em;
  color: var(--text-primary);
}

.top-actions {
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-secondary);
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.icon-btn:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--accent-light);
  transform: translateY(-1px);
}

.icon-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

.status-row {
  width: 100%;
  max-width: 960px;
  margin: 0 auto;
  padding: 0.7rem 1.25rem;
  border-radius: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  background: transparent;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.75rem;
  letter-spacing: 0.02em;
  font-weight: 500;
  text-transform: uppercase;
}

.status-left {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  min-width: 0;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--text-muted);
  flex-shrink: 0;
}

.dot.online { background: #30b0c0; }
.dot.error { background: #ff5555; }

.status-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-muted);
}

.chat-wrap {
  flex: 1;
  overflow: hidden;
  width: 100%;
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  min-height: 0;
  padding: 0 1.25rem;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem 0;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  scroll-behavior: smooth;
  min-height: 0;
}

.chat::-webkit-scrollbar { width: 6px; }
.chat::-webkit-scrollbar-track { background: transparent; }
.chat::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}
.chat::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

.empty {
  flex: 1;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--text-muted);
  gap: 0.5rem;
  padding: 2rem;
}

.empty h2 {
  font-family: var(--font-display);
  color: var(--text-primary);
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 0.5rem;
}

.empty p {
  font-size: 0.9rem;
  color: var(--text-secondary);
  max-width: 280px;
  line-height: 1.5;
}

.msg {
  max-width: 75%;
  padding: 0.75rem 1rem;
  border-radius: 14px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.5;
  font-size: 0.95rem;
  animation: fadeUp 0.25s ease-out;
  border: 1px solid transparent;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.msg.user {
  align-self: flex-end;
  background: var(--msg-user);
  color: #ffffff;
  border-color: rgba(255, 255, 255, 0.2);
  border-bottom-right-radius: 6px;
  word-break: break-word;
}

.msg.ai {
  align-self: flex-start;
  background: var(--msg-ai);
  border-color: var(--border);
  border-bottom-left-radius: 6px;
  color: var(--text-primary);
}

.msg.system {
  align-self: center;
  max-width: 90%;
  font-size: 0.75rem;
  color: var(--text-muted);
  padding: 0.35rem 0.7rem;
  border-radius: 8px;
  background: var(--bg-elevated);
  border-color: var(--border);
}

.typing {
  display: none;
  align-self: flex-start;
  padding: 0.55rem 0.8rem;
  border-radius: 14px;
  background: var(--msg-ai);
  border: 1px solid var(--border);
  width: fit-content;
}

.typing span {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: var(--text-muted);
  margin: 0 2.5px;
  animation: bounce 1.4s infinite ease-in-out;
}

.typing span:nth-child(1) { animation-delay: -0.32s; }
.typing span:nth-child(2) { animation-delay: -0.16s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

.composer {
  position: sticky;
  bottom: 0;
  padding: 1rem 0;
  background: var(--bg-primary);
}

.composer-shell {
  border-radius: 16px;
  padding: 0.5rem;
  display: flex;
  align-items: flex-end;
  gap: 0.6rem;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
}

.composer textarea {
  flex: 1;
  border: 0;
  outline: none;
  background: transparent;
  color: var(--text-primary);
  resize: none;
  font: inherit;
  line-height: 1.45;
  font-size: 0.95rem;
  padding: 0.6rem 0.7rem;
  max-height: 140px;
  min-height: 40px;
}

.composer textarea::placeholder {
  color: var(--text-muted);
}

.send-btn {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-pill);
  border: 1px solid transparent;
  background: var(--accent);
  color: #ffffff;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s ease;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.send-btn:hover {
  transform: translateY(-1px);
}

.send-btn:active { transform: scale(0.95); }

.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.send-btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

@media (max-width: 640px) {
  .msg { max-width: 85%; }
  .topbar-inner, .status-row, .chat-wrap { padding-left: 1rem; padding-right: 1rem; }
  .empty h2 { font-size: 1.6rem; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/" aria-label="Back to home">arthur</a>
    <div class="top-actions">
      <button id="themeBtn" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">🌙</button>
    </div>
  </div>
  <div class="status-row">
    <div class="status-left"><span id="statusDot" class="dot"></span><span id="statusText" class="status-text">Loading local model...</span></div>
    <span id="configText">-</span>
  </div>
</header>
<main class="chat-wrap">
  <section id="chat" class="chat" aria-live="polite">
    <div id="empty" class="empty"><h2>arthur chat</h2><p>A small language model running locally in your browser.</p></div>
    <div id="typing" class="typing" aria-label="Typing indicator"><span></span><span></span><span></span></div>
  </section>
  <div class="composer"><div class="composer-shell"><textarea id="input" rows="1" placeholder="Message arthur..." autofocus></textarea><button id="sendBtn" class="send-btn" title="Send" aria-label="Send">▶</button></div></div>
</main>
<script>
const chatEl=document.getElementById('chat');
const inputEl=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');
const typingEl=document.getElementById('typing');
const emptyEl=document.getElementById('empty');
const statusDot=document.getElementById('statusDot');
const statusText=document.getElementById('statusText');
const configText=document.getElementById('configText');
const themeBtn=document.getElementById('themeBtn');
const state={session:null,vocab:null,charToIdx:null,idxToChar:null,vocabSize:0,modelCfg:{},maxCtx:256,ready:false,localFailure:null,loadingPromise:null,generating:false};
function setTheme(theme){document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('arthur-theme',theme);themeBtn.textContent=theme==='dark'?'☀️':'🌙';}
function initTheme(){setTheme(localStorage.getItem('arthur-theme')||'dark');}
themeBtn.addEventListener('click',()=>{const current=document.documentElement.getAttribute('data-theme')||'dark';setTheme(current==='dark'?'light':'dark');});
function setStatus(kind,text){statusDot.className='dot';if(kind==='online')statusDot.classList.add('online');if(kind==='error')statusDot.classList.add('error');statusText.textContent=text;}
function hideEmpty(){if(emptyEl)emptyEl.style.display='none';}
function addMessage(role,text){hideEmpty();const node=document.createElement('div');node.className=`msg ${role}`;node.textContent=text;chatEl.insertBefore(node,typingEl);chatEl.scrollTop=chatEl.scrollHeight;return node;}
function addSystem(text){const node=document.createElement('div');node.className='msg system';node.textContent=text;chatEl.insertBefore(node,typingEl);chatEl.scrollTop=chatEl.scrollHeight;}
function setTyping(show){typingEl.style.display=show?'flex':'none';if(show)chatEl.scrollTop=chatEl.scrollHeight;}
function resizeInput(){inputEl.style.height='auto';inputEl.style.height=`${Math.min(inputEl.scrollHeight,140)}px`;}
function extractAnswer(text){const idx=text.indexOf('A:');let out=idx>=0?text.slice(idx+2):text;const stop=out.indexOf('\nQ:');if(stop>=0)out=out.slice(0,stop);return out.trim();}
function getConfigValues(cfg){const layers=cfg.num_layers??cfg.layers??'?';const heads=cfg.num_heads??cfg.heads??'?';const dim=cfg.embed_dim??cfg.dim??cfg.d_model??'?';return{layers,heads,dim};}
function encodeChars(text,maxLen){const chars=Array.from(text);const clip=chars.length>maxLen?chars.slice(chars.length-maxLen):chars;const ids=new Array(clip.length);for(let i=0;i<clip.length;i+=1){const id=state.charToIdx[clip[i]];ids[i]=Number.isFinite(id)?id:0;}return{ids,clippedText:clip.join('')};}
function decodeToken(idx){if(Array.isArray(state.idxToChar))return state.idxToChar[idx]||'';return state.idxToChar[String(idx)]||'';}
function sampleFromLogits(data,offset,vocabSize,temperature){const temp=Math.max(0.01,Number(temperature)||0.5);let maxLogit=-Infinity;for(let i=0;i<vocabSize;i+=1){const value=data[offset+i]/temp;if(value>maxLogit)maxLogit=value;}const probs=new Float64Array(vocabSize);let sum=0;for(let i=0;i<vocabSize;i+=1){const expv=Math.exp((data[offset+i]/temp)-maxLogit);probs[i]=expv;sum+=expv;}let r=Math.random()*sum;for(let i=0;i<vocabSize;i+=1){r-=probs[i];if(r<=0)return i;}return vocabSize-1;}
async function ensureLocalModel(){
  if(state.ready)return true;
  if(state.loadingPromise)return state.loadingPromise;
  state.loadingPromise=(async()=>{
    try {
      setStatus('online','Loading model...');
      if(window.ort&&window.ort.env&&window.ort.env.wasm){window.ort.env.wasm.wasmPaths='https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/';}
      const vocabResp=await fetch('/model/vocab.json',{cache:'no-store'});
      if(!vocabResp.ok)throw new Error(`vocab ${vocabResp.status}`);
      const vocab=await vocabResp.json();
      if(!vocab.char_to_idx||!vocab.idx_to_char)throw new Error('vocab format invalid');
      const session=await window.ort.InferenceSession.create('/model/arthur.onnx',{executionProviders:['wasm']});
      state.session=session;state.vocab=vocab;state.charToIdx=vocab.char_to_idx;state.idxToChar=vocab.idx_to_char;
      state.vocabSize=Number(vocab.vocab_size)||(Array.isArray(vocab.idx_to_char)?vocab.idx_to_char.length:Object.keys(vocab.idx_to_char).length);
      state.modelCfg=vocab.model_cfg||{};state.maxCtx=Number(state.modelCfg.max_len)||256;state.ready=true;state.localFailure=null;
      const c=getConfigValues(state.modelCfg);configText.textContent=`${c.layers}L/${c.heads}H/${c.dim}d`;setStatus('online','Model ready');
      return true;
    } catch (err) {
      state.localFailure=err;state.ready=false;configText.textContent='-';setStatus('error','Model unavailable');
      addSystem('Local model unavailable. Using server fallback.');
      return false;
    }
  })();
  return state.loadingPromise;
}
function fixBranding(text){return text.replace(/\b(nous|Nous|NOUS)\b/g,'Arthur');}
async function generateWithOnnx(userMessage,temperature,maxTokens){
  const prompt=`You are Arthur, a small language model.\nQ: ${userMessage}\nA:`;let context=prompt;let generated='';const limit=Math.min(maxTokens,state.maxCtx);
  for(let i=0;i<limit;i+=1){
    const encoded=encodeChars(context,state.maxCtx);
    const tensor=new window.ort.Tensor('int64',BigInt64Array.from(encoded.ids.map((id)=>BigInt(id))),[1,encoded.ids.length]);
    const output=await state.session.run({input_ids:tensor});
    const outputName=output.logits?'logits':Object.keys(output)[0];
    const logits=output[outputName];const dims=logits.dims;const seqLen=dims[1];const vocabSize=dims[2]||state.vocabSize;
    const idx=sampleFromLogits(logits.data,(seqLen-1)*vocabSize,vocabSize,temperature);const ch=decodeToken(idx);
    if(!ch)break;generated+=ch;context+=ch;if(generated.includes('\nQ:'))break;
  }
  return extractAnswer(`${prompt}${generated}`);
}
async function generateWithApi(userMessage,temperature,maxTokens){
  const prompt=`You are Arthur, a small language model.\nQ: ${userMessage}\nA:`;
  const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt,length:maxTokens,temperature})});
  const data=await res.json();if(!res.ok||data.error)throw new Error(data.error||`HTTP ${res.status}`);return extractAnswer(data.text||'');
}
async function send(){
  const text=inputEl.value.trim();if(!text||state.generating)return;
  addMessage('user',text);inputEl.value='';resizeInput();state.generating=true;sendBtn.disabled=true;setTyping(true);
  const temperature=0.5;const maxTokens=120;
  try {
    const localReady=await ensureLocalModel();
    const output=localReady?await generateWithOnnx(text,temperature,maxTokens):await generateWithApi(text,temperature,maxTokens);
    addMessage('ai',fixBranding(output)||'(empty response)');
  } catch (err) {
    try {const fallback=await generateWithApi(text,temperature,maxTokens);addMessage('ai',fixBranding(fallback)||'(empty response)');setStatus('error','Using API fallback');}
    catch (apiErr) {addSystem(`Generation failed: ${apiErr.message||err.message}`);}
  } finally {state.generating=false;sendBtn.disabled=false;setTyping(false);}
}
inputEl.addEventListener('input',resizeInput);
inputEl.addEventListener('keydown',(event)=>{if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}});
sendBtn.addEventListener('click',send);
initTheme();resizeInput();ensureLocalModel();
</script>
</body>
</html>
