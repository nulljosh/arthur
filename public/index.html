<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aether v1.0 — Live Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e27;
      color: #e0e0e0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.5em;
      color: #64b5f6;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #90caf9;
      margin-bottom: 40px;
      font-size: 1.1em;
    }
    .demo {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 30px;
    }
    label {
      display: block;
      color: #64b5f6;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'SF Mono', Menlo, monospace;
    }
    button {
      background: #64b5f6;
      color: #0a0e27;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s;
    }
    button:hover {
      background: #90caf9;
      transform: translateY(-2px);
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
      transform: none;
    }
    .output {
      background: #1a1f3a;
      border-left: 4px solid #64b5f6;
      padding: 20px;
      border-radius: 4px;
      margin-top: 20px;
      min-height: 100px;
      max-height: 300px;
      overflow-y: auto;
    }
    .loading {
      color: #90caf9;
      font-style: italic;
    }
    .error {
      color: #ff6b6b;
    }
    .info {
      background: #1a1f3a;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      font-size: 0.95em;
      color: #aaa;
    }
    .stat {
      display: inline-block;
      margin-right: 30px;
      margin-bottom: 10px;
    }
    .stat-label {
      color: #64b5f6;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>aether</h1>
    <p class="subtitle">v1.0 — 3.5M params, live demo</p>

    <div class="info">
      <div class="stat"><span class="stat-label">Model:</span> aether v1.0</div>
      <div class="stat"><span class="stat-label">Params:</span> 3.5M</div>
      <div class="stat"><span class="stat-label">Layers:</span> 12</div>
      <div class="stat"><span class="stat-label">Loss:</span> 0.09</div>
    </div>

    <div class="demo">
      <label for="prompt">Prompt</label>
      <input type="text" id="prompt" placeholder="fn " value="fn ">

      <label for="maxTokens">Max Tokens</label>
      <input type="number" id="maxTokens" min="1" max="200" value="50">

      <label for="temp">Temperature</label>
      <input type="number" id="temp" min="0.1" max="2" step="0.1" value="0.8">

      <button id="generate" onclick="generateText()">Generate</button>

      <div id="output" class="output" style="display: none;"></div>
    </div>

    <div style="text-align: center; color: #666; font-size: 0.9em;">
      <p><a href="https://github.com/nulljosh/aether" style="color: #64b5f6;">GitHub</a> • <a href="/docs" style="color: #64b5f6;">API Docs</a></p>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;

    async function generateText() {
      const prompt = document.getElementById('prompt').value;
      const maxTokens = parseInt(document.getElementById('maxTokens').value);
      const temp = parseFloat(document.getElementById('temp').value);
      const output = document.getElementById('output');

      const btn = document.getElementById('generate');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      output.style.display = 'block';
      output.className = 'output loading';
      output.textContent = 'Generating...';

      try {
        const response = await fetch(`${API_URL}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: prompt,
            max_tokens: maxTokens,
            temperature: temp
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        output.className = 'output';
        output.innerHTML = `<strong>Prompt:</strong> ${prompt}<br><br><strong>Output:</strong><br>${data.output}<br><br><em>Tokens: ${data.tokens_generated}</em>`;
      } catch (error) {
        output.className = 'output error';
        output.textContent = `Error: ${error.message}. Make sure API is running.`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate';
      }
    }

    document.getElementById('prompt').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generateText();
    });
  </script>
</body>
</html>
