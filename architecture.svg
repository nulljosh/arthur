<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .box { fill: #1a1a1a; stroke: #e85d04; stroke-width: 2; }
      .label { fill: #e0e0e0; font-size: 13px; text-anchor: middle; }
      .sub { fill: #888; font-size: 10px; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .title { fill: #e85d04; font-size: 16px; font-weight: bold; text-anchor: start; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="820" height="240" fill="#111"/>

  <!-- Title -->
  <text x="15" y="25" class="title">aether</text>
  <text x="85" y="25" fill="#888" font-size="12"> / nano transformer LLM, 200 epochs</text>

  <!-- Training Data -->
  <rect x="10" y="90" width="110" height="55" rx="8" class="box"/>
  <text x="65" y="112" class="label">jot corpus</text>
  <text x="65" y="128" class="sub">185 KB syntax</text>

  <!-- Arrow -->
  <line x1="122" y1="117" x2="148" y2="117" class="arrow"/>

  <!-- PyTorch Trainer -->
  <rect x="150" y="90" width="130" height="55" rx="8" class="box"/>
  <text x="215" y="107" class="label">PyTorch Trainer</text>
  <text x="215" y="122" class="sub">AdamW + cosine LR</text>
  <text x="215" y="134" class="sub">grad clip, warmup</text>

  <!-- Arrow -->
  <line x1="282" y1="117" x2="308" y2="117" class="arrow"/>

  <!-- Checkpoint -->
  <rect x="310" y="90" width="120" height="55" rx="8" class="box"/>
  <text x="370" y="112" class="label">Checkpoint</text>
  <text x="370" y="128" class="sub">.pt (weights+vocab)</text>

  <!-- Fan-out arrows -->
  <line x1="432" y1="103" x2="468" y2="62" class="arrow"/>
  <line x1="432" y1="130" x2="468" y2="170" class="arrow"/>

  <!-- Export path -->
  <rect x="470" y="38" width="140" height="48" rx="8" class="box"/>
  <text x="540" y="56" class="label">Export (aether.bin)</text>
  <text x="540" y="72" class="sub">export_weights.py</text>

  <!-- Arrow export -> C engine -->
  <line x1="612" y1="62" x2="648" y2="62" class="arrow"/>

  <!-- C Inference Engine -->
  <rect x="650" y="35" width="155" height="55" rx="8" class="box"/>
  <text x="727" y="53" class="label">C Inference Engine</text>
  <text x="727" y="68" class="sub">aether.c, C99, mmap</text>
  <text x="727" y="80" class="sub">zero deps, 350 LOC</text>

  <!-- Flask Web UI -->
  <rect x="470" y="148" width="140" height="55" rx="8" class="box"/>
  <text x="540" y="170" class="label">Flask Web UI</text>
  <text x="540" y="186" class="sub">:5001, chat + quiz</text>

  <!-- Aether Daemon -->
  <rect x="650" y="148" width="155" height="55" rx="8" class="box"/>
  <text x="727" y="166" class="label">Aether Daemon</text>
  <text x="727" y="181" class="sub">continuous training</text>
  <text x="727" y="193" class="sub">milestone pings</text>

  <!-- Arrow from checkpoint to daemon -->
  <line x1="432" y1="130" x2="432" y2="175" class="arrow" style="marker-end: none;"/>
  <line x1="432" y1="175" x2="648" y2="175" class="arrow"/>
</svg>
