<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .box { fill: #1a1a1a; stroke: #e85d04; stroke-width: 2; }
      .label { fill: #e0e0e0; font-size: 13px; text-anchor: middle; }
      .sub { fill: #888; font-size: 10px; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="800" height="200" fill="#111"/>

  <!-- Training Data -->
  <rect x="10" y="75" width="110" height="50" rx="8" class="box"/>
  <text x="65" y="97" class="label">Training Data</text>
  <text x="65" y="113" class="sub">corpus + wiki</text>

  <!-- Arrow -->
  <line x1="122" y1="100" x2="148" y2="100" class="arrow"/>

  <!-- PyTorch Trainer -->
  <rect x="150" y="75" width="130" height="50" rx="8" class="box"/>
  <text x="215" y="97" class="label">PyTorch Trainer</text>
  <text x="215" y="113" class="sub">AdamW + cosine LR</text>

  <!-- Arrow -->
  <line x1="282" y1="100" x2="308" y2="100" class="arrow"/>

  <!-- Checkpoint -->
  <rect x="310" y="75" width="120" height="50" rx="8" class="box"/>
  <text x="370" y="97" class="label">Checkpoint</text>
  <text x="370" y="113" class="sub">.pt file</text>

  <!-- Fan-out arrows -->
  <line x1="432" y1="88" x2="468" y2="50" class="arrow"/>
  <line x1="432" y1="112" x2="468" y2="150" class="arrow"/>

  <!-- Export path -->
  <rect x="470" y="25" width="140" height="38" rx="8" class="box"/>
  <text x="540" y="41" class="label">Export (core.bin)</text>
  <text x="540" y="55" class="sub">export_weights.py</text>

  <!-- Arrow export -> C engine -->
  <line x1="612" y1="44" x2="648" y2="44" class="arrow"/>

  <!-- C Inference Engine -->
  <rect x="650" y="18" width="140" height="52" rx="8" class="box"/>
  <text x="720" y="38" class="label">C Inference Engine</text>
  <text x="720" y="52" class="sub">core.c, C99, mmap</text>
  <text x="720" y="64" class="sub">zero deps</text>

  <!-- Flask Web UI -->
  <rect x="470" y="125" width="140" height="50" rx="8" class="box"/>
  <text x="540" y="147" class="label">Flask Web UI</text>
  <text x="540" y="163" class="sub">:5001, chat + quiz</text>
</svg>
