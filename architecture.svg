<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .title { font-size: 16px; font-weight: 600; fill: #1d1d1f; }
    .label { font-size: 11px; font-weight: 500; fill: #1d1d1f; }
    .sub { font-size: 9px; fill: #86868b; }
    .node { fill: #f5f5f7; stroke: #d2d2d7; stroke-width: 1; rx: 8; }
    .center { fill: #0071e3; rx: 12; }
    .line { stroke: #d2d2d7; stroke-width: 1; fill: none; }
  </style>
  <rect width="400" height="300" fill="white"/>

  <!-- Center node -->
  <rect class="center" x="150" y="120" width="100" height="40"/>
  <text x="200" y="145" text-anchor="middle" fill="white" class="title">nuLLM</text>

  <!-- Tokenizer -->
  <rect class="node" x="20" y="25" width="100" height="44"/>
  <text x="70" y="45" text-anchor="middle" class="label">Tokenizer</text>
  <text x="70" y="58" text-anchor="middle" class="sub">BPE / WordPiece</text>
  <line class="line" x1="110" y1="60" x2="165" y2="120"/>

  <!-- Attention -->
  <rect class="node" x="150" y="15" width="100" height="44"/>
  <text x="200" y="35" text-anchor="middle" class="label">Attention</text>
  <text x="200" y="48" text-anchor="middle" class="sub">Multi-Head</text>
  <line class="line" x1="200" y1="59" x2="200" y2="120"/>

  <!-- Transformer -->
  <rect class="node" x="280" y="25" width="100" height="44"/>
  <text x="330" y="45" text-anchor="middle" class="label">Transformer</text>
  <text x="330" y="58" text-anchor="middle" class="sub">Encoder Stack</text>
  <line class="line" x1="290" y1="60" x2="235" y2="120"/>

  <!-- Training -->
  <rect class="node" x="290" y="130" width="100" height="44"/>
  <text x="340" y="150" text-anchor="middle" class="label">Training</text>
  <text x="340" y="163" text-anchor="middle" class="sub">Loss + Optimizer</text>
  <line class="line" x1="250" y1="140" x2="290" y2="145"/>

  <!-- Generation -->
  <rect class="node" x="280" y="220" width="100" height="44"/>
  <text x="330" y="240" text-anchor="middle" class="label">Generation</text>
  <text x="330" y="253" text-anchor="middle" class="sub">Autoregressive</text>
  <line class="line" x1="290" y1="230" x2="235" y2="160"/>

  <!-- Chat -->
  <rect class="node" x="150" y="235" width="100" height="44"/>
  <text x="200" y="255" text-anchor="middle" class="label">Chat</text>
  <text x="200" y="268" text-anchor="middle" class="sub">Conversational AI</text>
  <line class="line" x1="200" y1="235" x2="200" y2="160"/>

  <!-- Data -->
  <rect class="node" x="20" y="220" width="100" height="44"/>
  <text x="70" y="240" text-anchor="middle" class="label">Data</text>
  <text x="70" y="253" text-anchor="middle" class="sub">Training Corpus</text>
  <line class="line" x1="110" y1="230" x2="165" y2="160"/>

  <!-- Models -->
  <rect class="node" x="10" y="125" width="100" height="44"/>
  <text x="60" y="145" text-anchor="middle" class="label">Models</text>
  <text x="60" y="158" text-anchor="middle" class="sub">Saved Weights</text>
  <line class="line" x1="110" y1="147" x2="150" y2="140"/>
</svg>