<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .label { font-family: monospace; font-size: 14px; text-anchor: middle; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .title { font-family: sans-serif; font-size: 20px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" class="title" text-anchor="middle">aether Architecture</text>

  <!-- Input -->
  <rect x="50" y="80" width="100" height="60" class="box" />
  <text x="100" y="115" class="label">Input Text</text>

  <!-- Tokenizer -->
  <line x1="150" y1="110" x2="200" y2="110" class="arrow" />
  <rect x="200" y="80" width="100" height="60" class="box" />
  <text x="250" y="115" class="label">Tokenizer</text>

  <!-- Embedding -->
  <line x1="300" y1="110" x2="350" y2="110" class="arrow" />
  <rect x="350" y="80" width="100" height="60" class="box" />
  <text x="400" y="115" class="label">Embedding</text>

  <!-- Transformer Blocks -->
  <line x1="450" y1="110" x2="500" y2="110" class="arrow" />
  
  <!-- Block 1 -->
  <rect x="500" y="60" width="120" height="100" class="box" />
  <text x="560" y="85" class="label" font-size="12">Block 1</text>
  <text x="560" y="105" class="label" font-size="11">Attention</text>
  <text x="560" y="125" class="label" font-size="11">+ FFN</text>

  <!-- Block 2 -->
  <line x1="620" y1="110" x2="650" y2="110" class="arrow" />
  <rect x="650" y="60" width="120" height="100" class="box" />
  <text x="710" y="85" class="label" font-size="12">Block 2</text>
  <text x="710" y="105" class="label" font-size="11">Attention</text>
  <text x="710" y="125" class="label" font-size="11">+ FFN</text>

  <!-- Block 3 -->
  <line x1="770" y1="110" x2="800" y2="110" class="arrow" />
  <rect x="800" y="60" width="120" height="100" class="box" />
  <text x="860" y="85" class="label" font-size="12">Block 3</text>
  <text x="860" y="105" class="label" font-size="11">Attention</text>
  <text x="860" y="125" class="label" font-size="11">+ FFN</text>

  <!-- Output Layer -->
  <line x1="920" y1="110" x2="950" y2="110" class="arrow" />
  <rect x="950" y="80" width="0" height="60" class="box" />

  <!-- Details Section -->
  <text x="50" y="250" class="title" font-size="16">Key Components</text>

  <!-- Tokenizer -->
  <rect x="50" y="270" width="200" height="80" class="box" />
  <text x="150" y="290" class="label" font-size="12" font-weight="bold">Tokenizer</text>
  <text x="150" y="310" class="label" font-size="11">Char-level encoding</text>
  <text x="150" y="328" class="label" font-size="11">91 vocab size</text>
  <text x="150" y="346" class="label" font-size="11">Data: Math + Wikipedia</text>

  <!-- Embedding -->
  <rect x="300" y="270" width="200" height="80" class="box" />
  <text x="400" y="290" class="label" font-size="12" font-weight="bold">Embedding</text>
  <text x="400" y="310" class="label" font-size="11">128-dim vectors</text>
  <text x="400" y="328" class="label" font-size="11">Token + Position</text>
  <text x="400" y="346" class="label" font-size="11">Dropout: 0.1</text>

  <!-- Transformer -->
  <rect x="550" y="270" width="200" height="80" class="box" />
  <text x="650" y="290" class="label" font-size="12" font-weight="bold">Transformer</text>
  <text x="650" y="310" class="label" font-size="11">3 layers, 4 heads</text>
  <text x="650" y="328" class="label" font-size="11">FF dim: 256</text>
  <text x="650" y="346" class="label" font-size="11">~445K parameters</text>

  <!-- Output -->
  <rect x="800" y="270" width="150" height="80" class="box" />
  <text x="875" y="290" class="label" font-size="12" font-weight="bold">Output</text>
  <text x="875" y="310" class="label" font-size="11">Vocab logits</text>
  <text x="875" y="328" class="label" font-size="11">Next token</text>
  <text x="875" y="346" class="label" font-size="11">probability</text>

  <!-- Training Info -->
  <text x="50" y="450" class="title" font-size="16">Training</text>
  <rect x="50" y="470" width="900" height="100" class="box" />
  <text x="500" y="495" class="label" font-size="12">Dataset: Math (50%) + Current Events/Wikipedia (50%)</text>
  <text x="500" y="520" class="label" font-size="12">Loss Function: Cross-Entropy | Optimizer: Adam (lr=0.001)</text>
  <text x="500" y="545" class="label" font-size="12">Evaluation: Q&A accuracy (math, facts, identity, jot)</text>
</svg>
