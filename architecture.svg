<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .box { fill: #1a1a1a; stroke: #0a84ff; stroke-width: 2; }
      .label { fill: #e0e0e0; font-size: 12px; text-anchor: middle; font-weight: 500; }
      .sub { fill: #888; font-size: 9px; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .specs { fill: #e0e0e0; font-size: 11px; }
      .specs-sub { fill: #888; font-size: 9px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="800" height="600" fill="#111"/>

  <!-- Title -->
  <text x="400" y="30" class="label" font-size="16" text-anchor="middle" fill="#0a84ff" font-weight="bold">aether - Transformer Architecture</text>

  <!-- Row 1: Input Processing -->
  <rect x="30" y="70" width="100" height="50" rx="4" class="box"/>
  <text x="80" y="92" class="label">Input</text>
  <text x="80" y="105" class="sub">Query</text>

  <line x1="130" y1="95" x2="160" y2="95" class="arrow"/>

  <rect x="160" y="70" width="100" height="50" rx="4" class="box"/>
  <text x="210" y="92" class="label">Tokenizer</text>
  <text x="210" y="105" class="sub">91 chars</text>

  <line x1="260" y1="95" x2="290" y2="95" class="arrow"/>

  <rect x="290" y="70" width="100" height="50" rx="4" class="box"/>
  <text x="340" y="92" class="label">Embedding</text>
  <text x="340" y="105" class="sub">128-dim</text>

  <line x1="390" y1="95" x2="420" y2="95" class="arrow"/>

  <rect x="420" y="70" width="100" height="50" rx="4" class="box"/>
  <text x="470" y="92" class="label">Pos Embed</text>
  <text x="470" y="105" class="sub">Add</text>

  <!-- Row 2: Transformer Block 1 -->
  <line x1="520" y1="95" x2="550" y2="95" class="arrow"/>
  <line x1="550" y1="95" x2="550" y2="150" class="arrow"/>

  <rect x="470" y="150" width="160" height="60" rx="4" class="box"/>
  <text x="550" y="170" class="label">Transformer Block 1</text>
  <text x="550" y="185" class="sub">Multi-Head Attention (4 heads) + FFN (256-dim)</text>

  <!-- Row 3: Transformer Block 2 -->
  <line x1="550" y1="210" x2="550" y2="240" class="arrow"/>

  <rect x="470" y="240" width="160" height="60" rx="4" class="box"/>
  <text x="550" y="260" class="label">Transformer Block 2</text>
  <text x="550" y="275" class="sub">Multi-Head Attention (4 heads) + FFN (256-dim)</text>

  <!-- Row 4: Transformer Block 3 -->
  <line x1="550" y1="300" x2="550" y2="330" class="arrow"/>

  <rect x="470" y="330" width="160" height="60" rx="4" class="box"/>
  <text x="550" y="350" class="label">Transformer Block 3</text>
  <text x="550" y="365" class="sub">Multi-Head Attention (4 heads) + FFN (256-dim)</text>

  <!-- Row 5: Output -->
  <line x1="550" y1="390" x2="550" y2="420" class="arrow"/>

  <rect x="450" y="420" width="200" height="50" rx="4" class="box"/>
  <text x="550" y="442" class="label">Output Layer → Logits</text>
  <text x="550" y="455" class="sub">Vocabulary probabilities (91 tokens)</text>

  <!-- Specs Section -->
  <line x1="30" y1="500" x2="770" y2="500" stroke="#333" stroke-width="1"/>

  <text x="30" y="525" class="specs" font-weight="bold" fill="#0a84ff">Model Specs</text>
  <text x="30" y="545" class="specs-sub">Parameters: 445K | Layers: 3 | Heads: 4 | FF Dim: 256 | Vocab: 91</text>
  <text x="30" y="560" class="specs-sub">Training: Math (50%) + Wikipedia + Current Events (50%)</text>
  <text x="30" y="575" class="specs-sub">Loss: 0.13-0.19 (converging) | Tokenizer: Character-level</text>
</svg>
