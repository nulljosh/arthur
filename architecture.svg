<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <style>
    .box { fill: #fff; stroke: #d1d1d6; stroke-width: 1.5; }
    .box-main { fill: #1d1d1f; stroke: none; }
    .label { fill: #1d1d1f; font-size: 13px; font-weight: 500; }
    .label-main { fill: #fff; font-size: 16px; font-weight: 600; }
    .sublabel { fill: #86868b; font-size: 11px; }
    .line { stroke: #d1d1d6; stroke-width: 1.5; fill: none; }
    .code { fill: #1d1d1f; font-size: 11px; font-family: 'SF Mono', Menlo, monospace; }
  </style>

  <!-- Main: aether -->
  <rect class="box-main" x="310" y="20" width="180" height="44" rx="14"/>
  <text class="label-main" x="400" y="47" text-anchor="middle">aether</text>

  <!-- Connecting lines from main -->
  <path class="line" d="M 355 64 L 160 120"/>
  <path class="line" d="M 400 64 L 400 120"/>
  <path class="line" d="M 445 64 L 640 120"/>

  <!-- Data Layer -->
  <rect class="box" x="70" y="120" width="180" height="44" rx="12"/>
  <text class="label" x="160" y="140" text-anchor="middle">Data Layer</text>
  <text class="sublabel" x="160" y="155" text-anchor="middle">jot corpus · 185 KB</text>

  <!-- Model Layer -->
  <rect class="box" x="310" y="120" width="180" height="44" rx="12"/>
  <text class="label" x="400" y="140" text-anchor="middle">Model Layer</text>
  <text class="sublabel" x="400" y="155" text-anchor="middle">0.57M params · 200 epochs</text>

  <!-- Export Layer -->
  <rect class="box" x="550" y="120" width="180" height="44" rx="12"/>
  <text class="label" x="640" y="140" text-anchor="middle">Export Layer</text>
  <text class="sublabel" x="640" y="155" text-anchor="middle">aether.bin · mmap</text>

  <!-- Inference (separate from main) -->
  <path class="line" d="M 400 64 L 400 90 L 400 200"/>
  <rect class="box" x="310" y="200" width="180" height="44" rx="12"/>
  <text class="label" x="400" y="220" text-anchor="middle">C99 Inference</text>
  <text class="sublabel" x="400" y="235" text-anchor="middle">350 LOC · zero deps</text>

  <!-- Outputs box -->
  <rect fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1" x="50" y="290" width="700" height="190" rx="10"/>
  <text class="sublabel" x="400" y="312" text-anchor="middle">OUTPUTS &amp; INTERFACES</text>

  <!-- Left: Training Pipeline -->
  <rect class="box" x="80" y="325" width="300" height="140" rx="10"/>
  <text class="sublabel" x="230" y="345" text-anchor="middle">Training Pipeline</text>
  <text class="code" x="100" y="368">PyTorch training loop</text>
  <text class="code" x="100" y="388">AdamW + cosine LR decay</text>
  <text class="code" x="100" y="408">Gradient clipping + warmup</text>
  <text class="code" x="100" y="428">Checkpoint every epoch</text>
  <text class="code" x="100" y="448">Final: loss 0.2-0.9</text>

  <!-- Right: Deployment -->
  <rect class="box" x="420" y="325" width="300" height="140" rx="10"/>
  <text class="sublabel" x="570" y="345" text-anchor="middle">Deployment</text>
  <text class="code" x="440" y="368">Flask Web UI (:5001)</text>
  <text class="code" x="440" y="388">Chat + Quiz modes</text>
  <text class="code" x="440" y="408">C inference (50K tok/s)</text>
  <text class="code" x="440" y="428">Aether daemon automation</text>
  <text class="code" x="440" y="448">iMessage notifications</text>

  <!-- Lines from layers to outputs -->
  <path class="line" d="M 160 164 L 160 290" stroke-dasharray="4,4"/>
  <path class="line" d="M 400 244 L 400 290" stroke-dasharray="4,4"/>
  <path class="line" d="M 640 164 L 640 290" stroke-dasharray="4,4"/>
</svg>
