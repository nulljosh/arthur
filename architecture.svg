<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">core architecture</title>
  <desc id="desc">Updated architecture for the core tiny transformer project.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#161f36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4cc9f0"/>
      <stop offset="100%" stop-color="#90f7c4"/>
    </linearGradient>
    <style>
      .h { fill:#eaf0ff; font:700 34px 'Avenir Next',Segoe UI,Arial,sans-serif; }
      .s { fill:#9eb2d9; font:500 18px 'Avenir Next',Segoe UI,Arial,sans-serif; }
      .b { fill:#101a30; stroke:#2e4167; stroke-width:2; rx:16; }
      .t { fill:#dbe6ff; font:600 20px 'Avenir Next',Segoe UI,Arial,sans-serif; }
      .n { fill:#9fb3dc; font:500 15px 'Avenir Next',Segoe UI,Arial,sans-serif; }
      .ns { fill:#9fb3dc; font:500 14px 'Avenir Next',Segoe UI,Arial,sans-serif; }
      .a { stroke:#5ecbff; stroke-width:2.5; fill:none; marker-end:url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5ecbff"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="664" rx="24" fill="#0f1628" stroke="#243756" stroke-width="2"/>
  <rect x="48" y="48" width="1104" height="8" fill="url(#accent)"/>

  <text x="84" y="108" class="h">core — tiny transformer LM architecture</text>
  <text x="84" y="136" class="s">Updated pipeline: data -> tokenize -> train -> checkpoint -> eval</text>
  <text x="84" y="160" class="s">-> generate/web</text>

  <rect x="84" y="180" width="220" height="96" class="b"/>
  <text x="104" y="215" class="t">Data</text>
  <text x="104" y="238" class="n">data/*.txt</text>
  <text x="104" y="258" class="n">eval_prompt_suite.json</text>

  <rect x="354" y="180" width="220" height="96" class="b"/>
  <text x="374" y="215" class="t">Tokenizer</text>
  <text x="374" y="238" class="n">src/tokenizer.py</text>
  <text x="374" y="258" class="n">encode/decode</text>

  <rect x="624" y="180" width="220" height="96" class="b"/>
  <text x="644" y="215" class="t">Model</text>
  <text x="644" y="238" class="n">src/model.py</text>
  <text x="644" y="258" class="n">Transformer blocks</text>

  <rect x="894" y="180" width="220" height="96" class="b"/>
  <text x="914" y="215" class="t">Training Loop</text>
  <text x="914" y="238" class="n">src/train.py / cron</text>
  <text x="914" y="258" class="n">loss + checkpoints</text>

  <rect x="84" y="344" width="300" height="108" class="b"/>
  <text x="104" y="380" class="t">Checkpoints</text>
  <text x="104" y="404" class="n">models/*.pt</text>
  <text x="104" y="424" class="n">cron_best.pt / resume</text>

  <rect x="444" y="344" width="300" height="108" class="b"/>
  <text x="464" y="380" class="t">Evaluation</text>
  <text x="464" y="404" class="n">evaluate_checkpoints.py</text>
  <text x="464" y="424" class="n">logs/eval_results.json</text>

  <rect x="804" y="344" width="310" height="108" class="b"/>
  <text x="824" y="380" class="t">Inference + Web UI</text>
  <text x="824" y="404" class="n">src/generate.py</text>
  <text x="824" y="424" class="n">web_ui.py (/api/generate)</text>

  <rect x="84" y="520" width="1030" height="146" class="b"/>
  <text x="104" y="556" class="t">Automation</text>
  <text x="104" y="582" class="ns">cron/run.sh -> train_session.py -> evaluate.py -> report.sh</text>
  <text x="104" y="604" class="ns">Schedules: every 4h training/eval + 8:00 report</text>
  <text x="104" y="626" class="ns">Goal: improve math + simple Q&amp;A quality with continuous</text>
  <text x="104" y="646" class="ns">checkpoints</text>

  <path d="M304 228 L354 228" class="a"/>
  <path d="M574 228 L624 228" class="a"/>
  <path d="M844 228 L894 228" class="a"/>
  <path d="M1004 276 L1004 344" class="a"/>
  <path d="M894 398 L744 398" class="a"/>
  <path d="M444 398 L384 398" class="a"/>
  <path d="M234 452 L234 520" class="a"/>
  <path d="M594 452 L594 520" class="a"/>
  <path d="M959 452 L959 520" class="a"/>
</svg>
